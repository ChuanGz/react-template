name: Bug report
description: Report reproducible incorrect behavior
title: '[Bug]: '
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not report security vulnerabilities here. Follow SECURITY.md.
  - type: input
    id: revision
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: textarea
    id: options
    attributes:
      label: Options and environment
      description: Include selected options, OS, runtime, and package manager versions.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
