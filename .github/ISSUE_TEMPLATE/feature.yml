name: Feature proposal
description: Propose a scoped improvement
title: "[Proposal]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the user problem without prescribing a solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives and trade-offs
    validations:
      required: true
  - type: textarea
    id: contract
    attributes:
      label: Template contract impact
      description: Note effects on options, generated files, defaults, or compatibility.
